<!DOCTYPE html>
<html>
<head>
<title>Travel Recommendation</title>
  <p>This website helps users find travel recommendations for beaches, temples, and countries. Use the search feature to explore destinations with images.</p>
</head>
<body>

<h1>Welcome to Travel Recommendation Website</h1>

<nav>
<a href="index.html">Home</a> |
<a href="about.html">About Us</a> |
<a href="contact.html">Contact Us</a>
</nav>

<br>

<input type="text" id="search" placeholder="Search beaches, temples, countries">
<button onclick="search()">Search</button>
<button onclick="clearResults()">Clear</button>

<div id="results"></div>

<script>
function search() {
  let input = document.getElementById("search").value.toLowerCase();
  let output = "";

  if (input.includes("beach")) {
    output = "<h2>Beaches</h2>" +
    "<img src='https://via.placeholder.com/200'>" +
    "<img src='https://via.placeholder.com/200'>";
  }
  else if (input.includes("temple")) {
    output = "<h2>Temples</h2>" +
    "<img src='https://via.placeholder.com/200'>" +
    "<img src='https://via.placeholder.com/200'>";
  }
  else if (input.includes("country")) {
    output = "<h2>Countries</h2>" +
    "<img src='https://via.placeholder.com/200'>" +
    "<img src='https://via.placeholder.com/200'>";
  }

  document.getElementById("results").innerHTML = output;
}

function clearResults() {
  document.getElementById("results").innerHTML = "";
}
</script>

</body>
</html>
