<!DOCTYPE html>
<html>
<head>
<title>Travel Recommendation</title>
</head>
<body>

<p>This website helps users find travel recommendations for beaches, temples, and countries. Use the search feature to explore destinations with images.</p>

<h1>Welcome to Travel Recommendation Website</h1>

<nav>
<a href="index.html">Home</a> |
<a href="about.html">About Us</a> |
<a href="contact.html">Contact Us</a>
</nav>

<br>

<input type="text" id="search" placeholder="Search beaches, temples, countries">
<button onclick="search()">Search</button>
<button onclick="clearResults()">Clear</button>

<div id="results"></div>

<script>
function search() {
  let input = document.getElementById("search").value.toLowerCase();
  let output = "";

  if (input.includes("beach")) {
    output = "<h2>Beaches</h2>" +
    "<img src='https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSXo3xlrCq-EDrU-GDPowfLiKDeAUrGHSgCew&s'>" +
    "<img src='https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQSatxvizfQunTOqkNzuh98m87-C7f-oX8_qw&s'>";
  }
  else if (input.includes("temple")) {
    output = "<h2>Temples</h2>" +
    "<img src='https://holidaysdna.com/wp-content/uploads/temples-in-india-1.jpg'>" +
    "<img src='https://www.oyorooms.com/blog/wp-content/uploads/2017/10/Feature-Image-min-2-1.jpg'>";
  }
  else if (input.includes("country")) {
    output = "<h2>Countries</h2>" +
    "<img src='https://static.vecteezy.com/system/resources/thumbnails/020/833/849/small/world-map-with-country-names-free-vector.jpg'>" +
    "<img src='https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQGZQyZPzyBA-UAaYW7Q1hzzRabEctCvy5kRA&s'>";
  }

  document.getElementById("results").innerHTML = output;
}

function clearResults() {
  document.getElementById("results").innerHTML = "";
}
</script>

</body>
</html>
